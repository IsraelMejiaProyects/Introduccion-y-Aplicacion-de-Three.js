<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio - Three.js</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="fundamentos.html">Fundamentos</a>
    <a href="lab.html">Laboratorio</a>
  </nav>
</header>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<main class="lab-grid">

  <section class="panel code-panel">
    <h2>Código</h2>
    <textarea id="codeEditor" class="editor" readonly spellcheck="false"></textarea>

    <div class="editor-actions">
      <button id="applyBtn" disabled>Aplicar cambios</button>
      <button id="resetBtn">Restaurar código</button>
    </div>
  </section>

  <section class="panel help-panel">
    <h2>Asistencia</h2>
    <p id="progress"></p>
    <p id="instruction"></p>
    <p id="explanation"></p>
    <p id="hint"></p>
    <pre id="example"></pre>
  </section>

  <section class="panel scene-panel">
    <h2>Escena</h2>
    <div id="scene-container"></div>
  </section>

</main>

<section class="exercise-panel">
  <h3>Ejercicio</h3>
  <code id="exerciseCode"></code>

  <div class="exercise-row">
    <input type="text" id="userInput">
    <button id="checkBtn">Validar</button>
  </div>

  <p id="feedback"></p>
</section>

<script type="module" src="lab.js"></script>
</body>
</html>
