<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Laboratorio - Three.js</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<header>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="fundamentos.html">Fundamentos</a>
    <a href="lab.html">Laboratorio</a>
  </nav>
</header>

<div class="lab-container">

  <!-- CÓDIGO -->
  <div class="code-panel">
    <h2>Código</h2>
    <pre class="editor"><code id="codeDisplay" class="language-javascript"></code></pre>

    <h3>Ejercicio</h3>
    <code id="exerciseCode"></code>
  </div>
  <div class="help-panel">
    <p id="explanation"></p>
    <p id="hint"></p>
    <pre id="example"></pre>
  </div>  

  <!-- ESCENA -->
  <div class="scene-panel">
    <h2>Escena</h2>
    <div id="scene-container"></div>
  </div>

</div>

<!-- INTERACCIÓN -->
<div class="exercise-panel">
  <p id="instruction">Completa el código:</p>

  <input type="text" id="userInput" placeholder="Escribe aquí...">
  <button id="checkBtn">Validar</button>

  <p id="feedback"></p>
</div>

<script type="module" src="lab.js"></script>

</body>
</html>
